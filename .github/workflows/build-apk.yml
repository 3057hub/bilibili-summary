name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git python3 python3-pip python3-dev \
            python3-venv python3-setuptools \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev unzip zip wget \
            libltdl-dev libbz2-dev libgdbm-dev liblzma-dev \
            libsqlite3-dev libreadline-dev autopoint gperf

      - name: Install Buildozer & Cython
        run: |
          python3 -m pip install --upgrade pip
          pip install cython buildozer

      - name: Cache Buildozer NDK/SDK
        uses: actions/cache@v4
        with:
          path: |
            .buildozer/android/platform
          key: buildozer-v4-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-v4-

      - name: Build APK
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build-log.txt
        timeout-minutes: 60

      - name: Dump build log on failure
        if: failure()
        run: |
          echo "=== BUILD LOG (last 300 lines) ==="
          tail -300 build-log.txt || true

      - name: Locate APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" -type f 2>/dev/null || true
          mkdir -p bin
          cp .buildozer/android/platform/build-arm64-v8a/dists/bilisummary*/bin/*.apk bin/ 2>/dev/null || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiliSummary-debug
          path: |
            bin/*.apk
            .buildozer/android/platform/build-arm64-v8a/dists/**/*.apk
          retention-days: 30

      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          retention-days: 7
