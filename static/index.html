<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilibili 视频总结器</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/lucide.min.js"></script>
</head>

<body>
    <!-- Floating toast notifications -->
    <div id="toastContainer" class="toast-container"></div>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="header-row">
                    <h1><span class="icon"><i data-lucide="tv" class="lucide-icon"></i></span> BiliSummary</h1>
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">
                        <i data-lucide="moon" class="lucide-icon" id="themeIcon"></i>
                    </button>
                </div>
                <div class="subtitle">Bilibili 视频总结器</div>
            </div>
            <nav class="sidebar-nav">
                <!-- Summarize -->
                <div class="nav-section">
                    <div class="nav-section-title">总结</div>
                    <div class="nav-item active" data-page="url-page">
                        <span class="icon"><i data-lucide="link" class="lucide-icon"></i></span> URL 模式
                    </div>
                    <div class="nav-item" data-page="user-page">
                        <span class="icon"><i data-lucide="user" class="lucide-icon"></i></span> UP 主模式
                    </div>
                </div>
                <!-- Favorites — dynamically populated -->
                <div class="nav-section">
                    <div class="nav-section-title"><i data-lucide="star" class="lucide-icon"
                            style="width:12px;height:12px;vertical-align:-1px;margin-right:2px;"></i> 收藏夹</div>
                    <div id="sidebarFavorites"></div>
                </div>
                <!-- Browse — dynamically populated -->
                <div class="nav-section">
                    <div class="nav-section-title">浏览</div>
                    <div id="sidebarBrowse"></div>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="nav-item" data-page="settings-page" style="margin-bottom:8px;">
                    <span class="icon"><i data-lucide="settings" class="lucide-icon"></i></span> 设置
                </div>
                <div class="status-row">
                    <span class="status-dot" id="statusDot"></span>
                    <span class="status-text" id="statusText">检查中...</span>
                </div>
                <button class="btn-footer" id="loginBtn" onclick="startLogin()" style="display:none;">
                    <i data-lucide="key-round" class="lucide-icon" style="width:14px;height:14px;"></i> 登录
                </button>
                <button class="btn-footer btn-footer-danger" id="logoutBtn" onclick="doLogout()"
                    style="display:none;">退出登录</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <!-- URL Page -->
            <div class="page active" id="url-page">
                <div class="main-header">
                    <h2><i data-lucide="link" class="lucide-icon"></i> URL 模式</h2>
                    <p>粘贴 Bilibili 视频链接，一行一个</p>
                </div>
                <div class="main-body">
                    <div class="card">
                        <div class="form-group">
                            <label>视频链接</label>
                            <textarea id="urlInput"
                                placeholder="https://www.bilibili.com/video/BV...&#10;https://www.bilibili.com/video/BV..."></textarea>
                        </div>
                        <div class="input-row">
                            <div class="form-group">
                                <label>并发数</label>
                                <input class="input" id="urlConcurrency" type="number" value="12">
                            </div>
                        </div>
                        <button class="btn btn-primary" id="urlSubmit" onclick="submitURL()">
                            <i data-lucide="play" class="lucide-icon" style="width:14px;height:14px;"></i> 开始总结
                        </button>
                    </div>
                    <div class="progress-area" id="urlProgress">
                        <div class="card">
                            <div class="card-title"><i data-lucide="bar-chart-3" class="lucide-icon"
                                    style="width:15px;height:15px;"></i> 进度</div>
                            <div class="progress-bar-container">
                                <div class="progress-bar" id="urlProgressBar"></div>
                            </div>
                            <div class="progress-stats" id="urlStats"></div>
                            <div class="log-container" id="urlLog"></div>
                        </div>
                    </div>
                    <div class="results-area" id="urlResults"></div>
                </div>
            </div>

            <!-- User Page -->
            <div class="page" id="user-page">
                <div class="main-header">
                    <h2><i data-lucide="user" class="lucide-icon"></i> UP 主模式</h2>
                    <p>输入 UP 主的名字或 UID，批量总结视频</p>
                </div>
                <div class="main-body">
                    <div class="card">
                        <div class="form-group">
                            <label>UP 主名字 / UID</label>
                            <input class="input" id="userInput" placeholder="例如：成长曲奇 或 3493293337873099">
                        </div>
                        <div class="input-row">
                            <div class="form-group">
                                <label>视频数量</label>
                                <input class="input" id="userCount" type="number" value="50">
                            </div>
                            <div class="form-group">
                                <label>并发数</label>
                                <input class="input" id="userConcurrency" type="number" value="12">
                            </div>
                        </div>
                        <button class="btn btn-primary" id="userSubmit" onclick="submitUser()">
                            <i data-lucide="play" class="lucide-icon" style="width:14px;height:14px;"></i> 开始总结
                        </button>
                    </div>
                    <div class="progress-area" id="userProgress">
                        <div class="card">
                            <div class="card-title"><i data-lucide="bar-chart-3" class="lucide-icon"
                                    style="width:15px;height:15px;"></i> 进度</div>
                            <div class="progress-bar-container">
                                <div class="progress-bar" id="userProgressBar"></div>
                            </div>
                            <div class="progress-stats" id="userStats"></div>
                            <div class="log-container" id="userLog"></div>
                        </div>
                    </div>
                    <div class="results-area" id="userResults"></div>
                </div>
            </div>

            <!-- Favorites Browse Page -->
            <div class="page" id="fav-page">
                <div class="main-header">
                    <h2 id="favBrowseTitle"><i data-lucide="star" class="lucide-icon"></i> 收藏夹</h2>
                    <p id="favBrowseSubtitle">选择左侧收藏夹查看视频</p>
                </div>
                <div class="main-body">
                    <div class="video-grid" id="favVideoGrid"></div>
                    <div class="fav-auto-progress" id="favAutoProgress"></div>
                    <div class="load-more-container" id="favLoadMore" style="display:none;">
                        <button class="btn btn-secondary" onclick="loadMoreFavoriteVideos()">加载更多</button>
                    </div>
                    <!-- Reading view -->
                    <div class="reading-view" id="favReadingView" style="display:none;">
                        <div class="reading-header"
                            style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                            <div class="back-btn" onclick="closeFavReading()" style="margin-bottom:0;">← 返回列表</div>
                            <div id="favReadingActions" style="display:flex;gap:8px;"></div>
                        </div>
                        <div class="reading-content" id="favReadingContent"></div>
                    </div>
                </div>
            </div>

            <!-- Browse Page -->
            <div class="page" id="browse-page">
                <div class="main-header" id="browseHeader">
                    <h2 id="browseTitle"><i data-lucide="book-open" class="lucide-icon"></i> 浏览总结</h2>
                    <p id="browseSubtitle">选择左侧分类查看</p>
                </div>
                <div class="main-body">
                    <div id="browseList"></div>
                    <div class="reading-view" id="readingView">
                        <div class="back-btn" onclick="closeReading()">← 返回列表</div>
                        <div id="readingActions" style="display:flex;gap:8px;margin-bottom:8px;"></div>
                        <div class="reading-content" id="readingContent"></div>
                    </div>
                </div>
            </div>

            <!-- Settings Page -->
            <div class="page" id="settings-page">
                <div class="main-header">
                    <h2><i data-lucide="settings" class="lucide-icon"></i> 设置</h2>
                    <p>API 配置与模型选择</p>
                </div>
                <div class="main-body">
                    <div class="card">
                        <div class="card-title"><i data-lucide="key-round" class="lucide-icon"
                                style="width:15px;height:15px;"></i> API 配置</div>
                        <div class="form-group">
                            <label>API Base URL</label>
                            <input class="input" id="settingsBaseUrl"
                                placeholder="https://open.bigmodel.cn/api/anthropic">
                        </div>
                        <div class="form-group">
                            <label>API Token</label>
                            <div style="display:flex;gap:8px;">
                                <input class="input" id="settingsToken" type="password" placeholder="输入 API Token"
                                    style="flex:1;">
                                <button class="btn btn-secondary" onclick="toggleTokenVisibility()"
                                    style="padding:6px 10px;font-size:12px;" id="toggleTokenBtn">
                                    <i data-lucide="eye" class="lucide-icon" style="width:14px;height:14px;"
                                        id="tokenEyeIcon"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>默认模型</label>
                            <input class="input" id="settingsModel" placeholder="手动输入模型名称，或从下方列表选择">
                        </div>
                        <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:8px;">
                            <i data-lucide="save" class="lucide-icon" style="width:14px;height:14px;"></i> 保存配置
                        </button>
                        <div id="settingsSaveStatus" style="margin-top:8px;font-size:13px;"></div>
                    </div>
                    <div class="card" style="margin-top:16px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div class="card-title" style="margin:0;"><i data-lucide="cpu" class="lucide-icon"
                                    style="width:15px;height:15px;"></i> 可用模型</div>
                            <button class="btn btn-secondary" onclick="loadModels()"
                                style="padding:4px 12px;font-size:12px;">
                                <i data-lucide="refresh-cw" class="lucide-icon" style="width:12px;height:12px;"></i>
                                刷新列表
                            </button>
                        </div>
                        <div id="modelList" style="margin-top:12px;">
                            <p style="color:var(--text-muted);font-size:13px;">点击「刷新列表」获取可用模型</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- QR Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i data-lucide="smartphone" class="lucide-icon"></i> 扫码登录 Bilibili</h3>
                <div class="modal-close" onclick="closeLoginModal()">✕</div>
            </div>
            <div class="modal-body">
                <div class="qr-container" id="qrContainer">
                    <div class="qr-loading"><span class="spinner"></span> 生成二维码中...</div>
                </div>
                <div class="qr-status" id="qrStatus">请使用 Bilibili App 扫描二维码</div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        // Initialize Lucide icons after DOM & app.js loaded
        lucide.createIcons();
    </script>
</body>

</html>
