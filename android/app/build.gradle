plugins {
    id 'com.android.application'
    id 'com.chaquo.python'
}

android {
    namespace 'com.bilisummary'
    compileSdk 34

    defaultConfig {
        applicationId 'com.bilisummary'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '1.0.0'

        ndk {
            abiFilters 'arm64-v8a'
        }

        python {
            version '3.11'
            pip {
                install 'fastapi'
                install 'annotated-doc'
                install 'uvicorn'
                install 'anthropic'
                install 'bilibili-api-python'
                install 'aiohttp'
                install 'python-dotenv'
                install 'toml'
                install 'pydantic'
                install 'starlette'
                install 'anyio'
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
